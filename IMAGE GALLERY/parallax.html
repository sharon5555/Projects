<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Gallery</title>
    <link rel="stylesheet" href="./parallax.css">
</head>
<body>

    <!-- Hero Section -->
    <section class="hero">

        <h1>⚽ Football Legends</h1>

    </section>

    <!-- Gallery Section -->
    <section class="gallery">

        <div class="card">
            <img src="./assets/mm1.jpg" alt="">
            <h3>Messi</h3>
        </div>

        <div class="card">
            <img src="./assets/cc.jpg" alt="">
            <h3>Ronaldo</h3>
        </div>

        <div class="card">
            <img src="./assets/mba.jpg" alt="">
            <h3>Mbappe</h3>
        </div>

        <div class="card">
            <img src="./assets/haaland.jpg" alt="">
            <h3>Haaland</h3>
        </div>

    </section>

    <!-- Parallax Section -->
    <section class="parallax">

        <h2>World Class Players</h2>

    </section>

</body>
</html>
