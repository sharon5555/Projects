<!DOCTYPE html>

                <button>View More</button>

        </div>

        <div class="card">

            <img src="./assets/mba.jpg" alt="Mbappe">

            <div class="overlay">

                <h2>Kylian Mbappé</h2>

                <button>View More</button>
